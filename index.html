<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>田舎町・商店前通り v7</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <canvas id="view"></canvas>

    <div class="hud card title-card">
      <div class="eyebrow">縦画面スマホ向け / 軽量最適化 / マップ重視 v7</div>
      <div class="title">田舎町・商店前通り</div>
      <div class="desc">左下スティックで移動 / 右半分ドラッグで視点</div>
    </div>

    <div class="hud top-right stack">
      <button id="runBtn" class="chip run">走る: OFF</button>
      <button id="scanBtn" class="chip">SCANLINE: ON</button>
      <button id="qualityBtn" class="chip small">QUALITY: MID</button>
    </div>

    <div id="hint" class="hud card hint-card">コンビニ前スタート。重さを抑えつつ、立体感と街の密度を戻した版です。</div>

    <div class="hud bottom-left pad-wrap">
      <div id="pad" class="pad">
        <div id="stick" class="stick"></div>
      </div>
      <div class="label">移動</div>
    </div>

    <div class="hud bottom-right actions">
      <button id="actBtn" class="action">調べる</button>
      <div class="label right">右半分ドラッグで視点移動</div>
    </div>

    <div class="crosshair"></div>
  </div>
  <script src="game.js"></script>
</body>
</html>
