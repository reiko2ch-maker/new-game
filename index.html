<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>田舎町・商店前通り テストマップ</title>
  <meta name="description" content="縦画面スマホ向け一人称ホラーマップ試作。歩いて気持ちいい田舎町の空気感と操作感をGitHub Pagesで確認できる。" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <div id="overlay">
      <div class="top-bar">
        <div class="title-wrap">
          <div class="eyebrow">縦画面スマホ向け / マップ検証プロトタイプ</div>
          <h1>田舎町・商店前通り</h1>
        </div>
        <button id="scanlineToggle" class="small-btn" type="button">SCANLINE: ON</button>
      </div>

      <div class="center-ui">
        <div id="crosshair"></div>
        <div id="interactionHint">夏の夕方の空気が少し湿っている。</div>
      </div>

      <div class="bottom-ui">
        <div class="left-controls">
          <div id="joystickBase" class="joystick-base">
            <div id="joystickKnob" class="joystick-knob"></div>
          </div>
          <div class="control-caption">移動</div>
        </div>

        <div class="right-controls">
          <button id="runButton" class="action-btn action-run" type="button">走る</button>
          <button id="interactButton" class="action-btn action-main" type="button">調べる</button>
          <div class="control-caption right">右側をなぞると視点移動</div>
        </div>
      </div>

      <div id="toast"></div>

      <div id="introCard" class="intro-card">
        <div class="intro-panel">
          <div class="intro-small">ストーリーなし / マップ優先版</div>
          <h2>歩いて気持ちいい田舎町を先に作るテスト</h2>
          <p>
            まずは<strong>道・コンビニ・民家・電柱・路地・側溝・掲示板</strong>の空気感と、
            <strong>縦画面スマホでの歩きやすさ</strong>を確認する版です。<br />
            左下スティックで移動、右半分ドラッグで視点、右下で調べる。
          </p>
          <ul>
            <li>自宅前から商店前通りまで歩ける</li>
            <li>コンビニ周辺・路地・生活感のある家並みを確認できる</li>
            <li>GitHub Pagesにそのまま置ける構成</li>
          </ul>
          <button id="startButton" class="start-btn" type="button">テスト開始</button>
        </div>
      </div>

      <div id="scanlineLayer" aria-hidden="true"></div>
      <div id="vignetteLayer" aria-hidden="true"></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
